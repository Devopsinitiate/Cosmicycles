{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-900 flex items-center justify-center px-4">
    <div class="w-full max-w-md text-center">
        <div class="text-center mb-8">
            <i class="fas fa-moon text-purple-400 text-6xl mb-4"></i>
            <h1 class="text-4xl font-bold text-white">See You Soon</h1>
            <p class="text-purple-300 mt-2">You have been logged out</p>
        </div>
        <div class="bg-gray-800 bg-opacity-70 backdrop-blur-md rounded-xl shadow-lg p-8 border border-purple-900">
            <p class="text-gray-400 mb-6">The cycles will continue turning. Come back anytime to check your cosmic alignment.</p>
            <a href="{% url 'login' %}" class="inline-block bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-lg transition">
                <i class="fas fa-sign-in-alt mr-2"></i>Login Again
            </a>
        </div>
    </div>
</div>
{% endblock content %}
