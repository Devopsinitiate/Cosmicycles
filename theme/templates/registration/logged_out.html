{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20 relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-purple-900/10 via-transparent to-cyan-900/10 pointer-events-none"></div>
    <div class="w-full max-w-md relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-purple-500 to-cyan-500 mb-6 shadow-lg shadow-purple-500/30">
                <i class="fas fa-moon text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-bold gradient-text">See You Soon</h1>
            <p class="text-gray-400 mt-2">You have been logged out</p>
        </div>
        <div class="glass rounded-2xl p-8 glow-border text-center">
            <p class="text-gray-400 mb-6">The cycles will continue turning. Come back anytime to check your cosmic alignment.</p>
            <a href="{% url 'login' %}" class="btn-cosmic inline-flex">
                <i class="fas fa-sign-in-alt mr-2"></i>Login Again
            </a>
        </div>
    </div>
</div>
{% endblock content %}
