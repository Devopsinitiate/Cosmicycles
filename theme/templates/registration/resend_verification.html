{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-900 flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white">Resend Verification Email</h1>
            <p class="text-purple-300 mt-2">Enter the email you used to sign up</p>
        </div>
        <div class="bg-gray-800 bg-opacity-70 backdrop-blur-md rounded-xl shadow-lg p-8 border border-purple-900">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="id_email" class="block text-purple-200 text-sm font-medium mb-2">Email</label>
                    <input type="email" name="email" id="id_email" required
                           class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
                           placeholder="your@email.com">
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg transition">
                    Resend Verification Email
                </button>
            </form>
            <p class="mt-6 text-center text-gray-400 text-sm">
                <a href="{% url 'login' %}" class="text-purple-300 hover:text-purple-500">Back to Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock content %}
