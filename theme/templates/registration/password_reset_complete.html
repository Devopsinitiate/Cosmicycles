{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-900 flex items-center justify-center px-4">
    <div class="w-full max-w-md text-center">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white">Password Reset Complete</h1>
        </div>
        <div class="bg-gray-800 bg-opacity-70 backdrop-blur-md rounded-xl shadow-lg p-8 border border-purple-900">
            <p class="text-gray-300 text-lg mb-4">Your password has been successfully reset.</p>
            <div class="mt-6">
                <a href="{% url 'login' %}" class="inline-block bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-lg transition">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
