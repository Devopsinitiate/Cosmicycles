{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20 relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-purple-900/10 via-transparent to-cyan-900/10 pointer-events-none"></div>
    <div class="w-full max-w-md relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-purple-500 to-cyan-500 mb-4 shadow-lg shadow-purple-500/30">
                <i class="fas fa-envelope text-white text-2xl"></i>
            </div>
            <h1 class="text-4xl font-bold gradient-text">Check Your Email</h1>
        </div>
        <div class="glass rounded-2xl p-8 glow-border text-center">
            <p class="text-gray-300 text-lg mb-4">If an account with that email exists, we've sent a password reset link.</p>
            <p class="text-gray-400 text-sm">Please check your inbox and follow the instructions.</p>
            <div class="mt-6">
                <a href="{% url 'login' %}" class="text-purple-400 hover:text-purple-300 font-medium transition-colors">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
