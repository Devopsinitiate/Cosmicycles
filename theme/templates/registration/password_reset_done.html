{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-900 flex items-center justify-center px-4">
    <div class="w-full max-w-md text-center">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white">Check Your Email</h1>
        </div>
        <div class="bg-gray-800 bg-opacity-70 backdrop-blur-md rounded-xl shadow-lg p-8 border border-purple-900">
            <p class="text-gray-300 text-lg mb-4">If an account with that email exists, we've sent a password reset link.</p>
            <p class="text-gray-400 text-sm">Please check your inbox and follow the instructions.</p>
            <div class="mt-6">
                <a href="{% url 'login' %}" class="text-purple-300 hover:text-purple-500 font-medium">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
