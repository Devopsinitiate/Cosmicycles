{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20 relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-purple-900/10 via-transparent to-cyan-900/10 pointer-events-none"></div>
    <div class="w-full max-w-md relative z-10 animate-slide-up">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-purple-500 to-cyan-500 mb-4 shadow-lg shadow-purple-500/30">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h1 class="text-4xl font-bold gradient-text">Reset Password</h1>
            <p class="text-gray-400 mt-2 text-sm">Enter your email and we'll send a reset link</p>
        </div>
        <div class="glass rounded-2xl p-8 glow-border">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="id_email" class="block text-gray-300 text-sm font-medium mb-2">Email</label>
                    <input type="email" name="email" id="id_email" required class="input-cosmic" placeholder="your@email.com">
                </div>
                <button type="submit" class="btn-cosmic">
                    <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
                </button>
            </form>
            <p class="mt-6 text-center text-gray-400 text-sm">
                <a href="{% url 'login' %}" class="text-purple-400 hover:text-purple-300 transition-colors">Back to Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock content %}
