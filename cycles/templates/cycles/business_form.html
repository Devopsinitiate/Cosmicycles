{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">{% if form.instance.pk %}Edit Business{% else %}Add New Business{% endif %}</h1>
    <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition">
                Save Business
            </button>
            <a href="{% url 'business_list' %}" class="ml-4 text-gray-600 hover:text-gray-800 font-medium">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock content %}
