{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-b from-purple-900/10 via-transparent to-cyan-900/10 pointer-events-none"></div>
    <div class="max-w-2xl mx-auto px-4 py-8 relative z-10">
        <div class="text-center mb-10 animate-slide-up">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-purple-500 to-cyan-500 mb-4 shadow-lg shadow-purple-500/30">
                <i class="fas fa-briefcase text-white text-2xl"></i>
            </div>
            <h1 class="text-4xl font-bold gradient-text mb-2">{% if form.instance.pk %}Edit Business{% else %}Add New Business{% endif %}</h1>
        </div>
        <div class="glass rounded-2xl p-6 md:p-8 glow-border animate-slide-up">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-cosmic mt-4">
                    <i class="fas fa-save mr-2"></i>Save Business
                </button>
                <a href="{% url 'business_list' %}" class="ml-4 text-gray-400 hover:text-purple-300 font-medium transition-colors">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
